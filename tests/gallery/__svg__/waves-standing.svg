<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Waves</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lab-playwrap"><div style="border-radius:14px;overflow:hidden;background:var(--stage-bg);border:1px solid var(--stage-grid)"><div style="width:100%"><canvas role="img" aria-label="standing wave, v=fλ=6.67" style="display:block;width:100%;height:300px;touch-action:none;cursor:default"></canvas></div></div><button type="button" class="lab-play-toggle" data-playing="false" aria-label="Play" aria-pressed="false">▶ Play</button></div></div><div class="lab-aside"><div class="lab-callout" data-tone="result"><div class="lab-field-label">wave speed <span><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>v</mi><mo>=</mo><mi>f</mi><mi>λ</mi></mrow><annotation encoding="application/x-tex">v = f\lambda</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal" style="margin-right:0.0359em;">v</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord mathnormal" style="margin-right:0.1076em;">f</span><span class="mord mathnormal">λ</span></span></span></span></span></div><span class="lab-callout-big">6.67</span><span style="font-size:12px;color:var(--stage-muted)">1.0 · 6.67 · T=1.00</span></div><p class="lab-prompt" style="font-size:13px">Harmonic n=3: 3 antinodes, 4 nodes, <span><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>λ</mi><mo>=</mo><mstyle scriptlevel="0" displaystyle="false"><mfrac><mrow><mn>2</mn><mi>L</mi></mrow><mi>n</mi></mfrac></mstyle></mrow><annotation encoding="application/x-tex">\lambda = \tfrac{2L}{n}</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord mathnormal">λ</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1.2173em;vertical-align:-0.345em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.8723em;"><span style="top:-2.655em;"><span class="pstrut" style="height:3em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mathnormal mtight">n</span></span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.394em;"><span class="pstrut" style="height:3em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">2</span><span class="mord mathnormal mtight">L</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.345em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span></span></span></span></span> = 6.67. Nodes never move; antinodes swing hardest.</p></div></div><div class="lab-controls"><span class="lab-field"><span class="lab-field-label">view</span><span class="lab-field-row"><span style="display:flex;gap:6px;flex-wrap:wrap"><button type="button" class="lab-chip" data-sel="false">travelling</button><button type="button" class="lab-chip" data-sel="false">superpose</button><button type="button" class="lab-chip" data-sel="true">standing</button></span><