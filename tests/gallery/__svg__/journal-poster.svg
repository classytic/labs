<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Post the entry: fill the T-accounts</p><p class="lab-prompt">Choose the debit (left) and credit (right) account for each event.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:16px"><p style="margin:0 0 4px;font-size:12px;color:var(--stage-muted);font-weight:700">Event 1 of 5</p><p style="margin:0 0 10px;font-weight:600">Owner pays $10,000 into the business bank account <span style="color:var(--stage-accent)">($10,000)</span></p><div style="display:flex;gap:8px;margin-bottom:10px;font-size:13px"><span style="flex:1;padding:6px 10px;border-radius:8px;border:1px dashed var(--stage-grid);background:transparent">DEBIT (left): <b>, </b></span><span style="flex:1;padding:6px 10px;border-radius:8px;border:1px dashed var(--stage-grid);background:transparent">CREDIT (right): <b>, </b></span></div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px"><button type="button" class="lab-chip" data-sel="false"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-good);margin-right:6px"></span>Cash</button><button type="button" class="lab-chip" data-sel="false"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-good);margin-right:6px"></span>Equipment</button><button type="button" class="lab-chip" data-sel="false"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-danger);margin-right:6px"></span>Bank loan</button><button type="button" class="lab-chip" data-sel="false"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-accent);margin-right:6px"></span>Capital</button><button type="button" class="lab-chip" data-sel="false"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-accent-2);margin-right:6px"></span>Sales</button><button type="button" class="lab-chip" data-sel="false"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-warn);margin-right:6px"></span>Rent expense</button></div><div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap"><button type="button" class="lab-btn" disabled="">Post entry</button><button type="button" class="lab-chip">clear</button></div><div style="margin-top:10px"></div></div><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">Owner pays $10,000 into the business bank account</div></div></div></div>