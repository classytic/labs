<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">The central dogma — DNA → mRNA → protein</p><p class="lab-prompt">Transcribe the DNA into mRNA (T→U), then translate each codon into an amino acid.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:14px;overflow-x:auto"><div style="display:flex;gap:5px;align-items:center"><span style="min-width:92px;font-size:11px;font-weight:700;color:var(--stage-muted)">DNA template</span><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-danger);color:var(--stage-bg)">T</div><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-good);color:var(--stage-bg)">A</div><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-accent);color:var(--stage-bg)">C</div><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-accent-2);color:var(--stage-bg)">G</div><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-good);color:var(--stage-bg)">A</div><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-good);color:var(--stage-bg)">A</div><div style="min-width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--stage-accent);color:var(--stage-bg)"