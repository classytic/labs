<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Ripple tank — two-source interference</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lab-playwrap"><div style="border-radius:14px;overflow:hidden;background:#0b1726;border:1px solid var(--stage-grid)"><div style="width:100%"><canvas role="img" aria-label="ripple tank two-source interference" style="display:block;width:100%;height:320px;touch-action:none;cursor:crosshair"></canvas></div></div><button type="button" class="lab-play-toggle" data-playing="false" aria-label="Play" aria-pressed="false">▶ Play</button></div></div><div class="lab-aside"><div class="lab-callout" data-tone="result"><div class="lab-field-label" style="margin-bottom:6px">interference</div><div style="display:flex;flex-direction:column;gap:6px;font-size:14px;font-weight:700"><span><span style="color:var(--stage-good)">bright</span> — crests meet · <span><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi mathvariant="normal">Δ</mi><mo>=</mo><mi>n</mi><mi>λ</mi></mrow><annotation encoding="application/x-tex">\Delta = n\lambda</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord">Δ</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.6944em;"></span><span class="mord mathnormal">nλ</span></span></span></span></span></span><span><span style="color:var(--stage-accent)">dark</span> — crest + trough · <span><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi mathvariant="normal">Δ</mi><mo>=</mo><mrow><mo fence="true">(</mo><mi>n</mi><mo>+</mo><mstyle scriptlevel="0" displaystyle="false"><mfrac><mn>1</mn><mn>2</mn></mfrac></mstyle><mo fence="true">)</mo></mrow><mi>λ</mi></mrow><annotation encoding="application/x-tex">\Delta = \left(n + \tfrac12\right)\lambda</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.6833em;"></span><span class="mord">Δ</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:1.2em;vertical-align:-0.35em;"></span><span class="minner"><span class="mopen delimcenter" style="top:0em;"><span class="delimsizing size1">(</span></span><span class="mord mathnormal">n</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mbin">+</span><span class="mspace" style="margin-right:0.2222em;"></span><span class="mord"><span class="mopen nulldelimiter"></span><span class="mfrac"><span class="vlist-t vlist-t2"><span class="vlist-r"><span class="vlist" style="height:0.8451em;"><span style="top:-2.655em;"><span class="pstrut" style="height:3em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">2</span></span></span></span><span style="top:-3.23em;"><span class="pstrut" style="height:3em;"></span><span class="frac-line" style="border-bottom-width:0.04em;"></span></span><span style="top:-3.394em;"><span class="pstrut" style="height:3em;"></span><span class="sizing reset-size6 size3 mtight"><span class="mord mtight"><span class="mord mtight">1</span></span></span></span></span><span class="vlist-s">​</span></span><span class="vlist-r"><span class="vlist" style="height:0.345em;"><span></span></span></span></span></span><span class="mclose nulldelimiter"></span></span><span class="mclose delimcenter" style="top:0em;"><span class="delimsizing size1">)</span></span></span><span class="mspace" style="margin-right:0.1667em;"></span><span class="mord mathnormal">λ</span></span></span></span></span></span></div></div><p class="lab-prompt" style="font-size:13px">Live ripples — watch crests collide. The still (grey) lines between the churn are where the waves cancel. Shorter wavelength or wider sources → more, tighter fringes.</p></div></div><div class="lab-controls"><span class="lab-field"><span class="lab-field-label">view</span><span class="lab-field-row"><span style="display:flex;gap:6px"><button type="button" class="lab-chip" data-sel="true">ripples</button><button type="button" class="lab-chip" data-sel="false">fringes</button></span></span></span><span class="lab-field"><span class="lab-field-label">wavelength</span><span class="lab-field-row"><input type="range" class="lab-slider" min="0.05" max="0.2" step="0.005" aria-label="wavelength" value="0.1"/><span class="lab-field-val">0.100</span></span></span><span style="font-size:12px;color:var(--stage-muted)">drag the two white sources ↔ · ▶ play to animate</span></div><div class="lab-foot"></div></div>