<svg width="640" height="300" viewBox="0 0 640 300" role="group" aria-label="Ball whirling at 6 m/s on a 3 m string, centripetal force 12 newtons" style="display:block;background:var(--stage-bg);border-radius:12px;border:1px solid var(--stage-grid);user-select:none;touch-action:none"><defs><marker id="stage-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="context-stroke"></path></marker></defs><g data-stage-content="true"><ellipse cx="320" cy="150" rx="69" ry="69" stroke="var(--stage-fg)" stroke-width="1.2" fill="none" opacity="0.3"></ellipse><circle cx="320" cy="150" r="5" fill="var(--stage-fg)" opacity="0.7"></circle><line x1="320" y1="150" x2="389" y2="150" stroke="var(--stage-fg)" stroke-width="1.5" opacity="0.5" stroke-linecap="round"></line><line x1="389" y1="150" x2="361.4" y2="150" stroke="var(--stage-warn)" stroke-width="3" opacity="1" stroke-linecap="round" marker-end="url(#stage-arrow)"></line><text x="361.4" y="146" fill="var(--stage-warn)" font-size="12" font-weight="600" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke;stroke:var(--stage-bg);stroke-width:3;stroke-linejoin:round">F</text><line x1="389" y1="150" x2="389" y2="87.9" stroke="var(--stage-good)" stroke-width="3" opacity="1" stroke-linecap="round" marker-end="url(#stage-arrow)"></line><text x="389" y="83.9" fill="var(--stage-good)" font-size="12" font-weight="600" text-anchor="middle" dominant-baseline="middle" style="paint-order:stroke;stroke:var(--stage-bg);stroke-width:3;stroke-linejoin:round">v</text><ellipse cx="389" cy="150" rx="10.35" ry="10.35" stroke="var(--stage-accent)" stroke-width="1.5" fill="var(--stage-accent)" fill-opacity="0.9" opacity="1"></ellipse></g><g data-stage-overlay="true"></g></svg>