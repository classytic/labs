<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Dihybrid (AaBb × AaBb)</p><p class="lab-prompt">Two genes assort independently — four gametes each, sixteen boxes, four phenotype classes.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><p style="font-size:12px;color:var(--stage-muted);margin:0 0 8px"><span>Gene 1: <span><b style="color:var(--stage-fg);font-weight:800">A</b>=tall, </span><span><b style="color:var(--stage-fg);font-weight:800">a</b>=short</span> · </span><span>Gene 2: <span><b style="color:var(--stage-fg);font-weight:800">B</b>=yellow, </span><span><b style="color:var(--stage-fg);font-weight:800">b</b>=green</span></span></p><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:16px;overflow-x:auto"><div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;align-items:center"><span style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap">Parent 1:<span style="display:inline-flex;gap:2px;padding:2px 4px;border-radius:8px;background:color-mix(in oklab, var(--stage-fg) 6%, transparent)"><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 1 gene 1 allele 1: A, tap to change">A</button><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 1 gene 1 allele 2: a, tap to change">a</button></span><span style="display:inline-flex;gap:2px;padding:2px 4px;border-radius:8px;background:color-mix(in oklab, var(--stage-fg) 6%, transparent)"><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 1 gene 2 allele 1: B, tap to change">B</button><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 1 gene 2 allele 2: b, tap to change">b</button></span></span><span style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap">Parent 2:<span style="display:inline-flex;gap:2px;padding:2px 4px;border-radius:8px;background:color-mix(in oklab, var(--stage-fg) 6%, transparent)"><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 2 gene 1 allele 1: A, tap to change">A</button><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 2 gene 1 allele 2: a, tap to change">a</button></span><span style="display:inline-flex;gap:2px;padding:2px 4px;border-radius:8px;background:color-mix(in oklab, var(--stage-fg) 6%, transparent)"><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 2 gene 2 allele 1: B, tap to change">B</button><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-fg);font-weight:800" aria-label="Parent 2 gene 2 allele 2: b, tap to change">b</button></span></span><span style="font-size:12px;color:var(--stage-muted)">(tap an allele to cycle it)</span></div><div style="display:inline-grid;grid-template-columns:40px repeat(4, 40px);gap:4px"><div></div><div style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">AB</div><div style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">Ab</div><div style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">aB</div><div style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">ab</div><div style="display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--stage-fg)">AB</div><button type="button" title="AABB → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AABB</button><button type="button" title="AABb → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AABb</button><button type="button" title="AaBB → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AaBB</button><button type="button" title="AaBb → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AaBb</button><div style="display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--stage-fg)">Ab</div><button type="button" title="AABb → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AABb</button><button type="button" title="AAbb → tall green" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AAbb</button><button type="button" title="AaBb → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AaBb</button><button type="button" title="Aabb → tall green" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">Aabb</button><div style="display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--stage-fg)">aB</div><button type="button" title="AaBB → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AaBB</button><button type="button" title="AaBb → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AaBb</button><button type="button" title="aaBB → short yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent-2) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">aaBB</button><button type="button" title="aaBb → short yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent-2) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">aaBb</button><div style="display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--stage-fg)">ab</div><button type="button" title="AaBb → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">AaBb</button><button type="button" title="Aabb → tall green" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">Aabb</button><button type="button" title="aaBb → short yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent-2) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">aaBb</button><button type="button" title="aabb → short green" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-warn) 13%, var(--stage-bg));cursor:pointer;font-size:13px;font-weight:700;color:var(--stage-fg);padding:0">aabb</button></div><div class="lab-bar" style="margin-top:14px;gap:16px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div style="font-size:11px;font-weight:700;color:var(--stage-muted);margin-bottom:3px">phenotype: 9 tall yellow : 3 tall green : 3 short yellow : 1 short green</div><div style="display:flex;height:16px;border-radius:6px;overflow:hidden;border:1px solid var(--stage-grid)"><div style="flex:0.5625;background:var(--stage-good);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">9</div><div style="flex:0.1875;background:var(--stage-accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">3</div><div style="flex:0.1875;background:var(--stage-accent-2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">3</div><div style="flex:0.0625;background:var(--stage-warn);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div></div></div><span class="lab-pill" data-state="ok">9:3:3:1 tall yellow : tall green : short yellow : short green</span></div></div></div></div><div class="lab-foot"><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">phenotype ratio 9 tall yellow, 3 tall green, 3 short yellow, 1 short green.</div></div></div>