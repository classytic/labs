<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Dihybrid (AaBb × AaBb)</p><p class="lab-prompt">Two genes assort independently, four gametes each, sixteen boxes, four phenotype classes.</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><p style="font-size:12px;color:var(--stage-muted);margin:0 0 8px"><span>Gene 1: <span><b style="color:var(--stage-fg);font-weight:800">A</b>=tall, </span><span><b style="color:var(--stage-fg);font-weight:800">a</b>=short</span> · </span><span>Gene 2: <span><b style="color:var(--stage-fg);font-weight:800">B</b>=yellow, </span><span><b style="color:var(--stage-fg);font-weight:800">b</b>=green</span></span></p><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:16px;overflow-x:auto"><div role="table" aria-label="Punnett grid, 4 by 4. phenotype ratio 9 tall yellow, 3 tall green, 3 short yellow, 1 short green." style="display:inline-grid;grid-template-columns:40px repeat(4, 40px);gap:4px"><div role="row" style="display:contents"><div role="columnheader" aria-hidden="true" style="pointer-events:none"></div><div role="columnheader" style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">AB</div><div role="columnheader" style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">Ab</div><div role="columnheader" style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">aB</div><div role="columnheader" style="text-align:center;font-size:13px;font-weight:800;color:var(--stage-fg)">ab</div></div><div role="row" style="display:contents"><div role="rowheader" style="display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--stage-fg)">AB</div><button type="button" role="cell" aria-label="AB × AB → AABB, tall yellow" title="AABB → tall yellow" style="width:40px;height:40px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix