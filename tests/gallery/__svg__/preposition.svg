<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Where is it?</p><p class="lab-prompt">Pick the preposition — in English it comes BEFORE the noun.</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lang-lab"><div class="lang-scene"><div class="lang-prepscene" role="img" aria-label="🐦 above 🌳"><span class="lang-preplandmark" aria-hidden="true">🌳</span><span class="lang-prepfig" style="left:50%;top:20%;transform:translate(-50%,-50%)" aria-hidden="true">🐦</span></div></div><div class="lang-sentence" aria-label="sentence"><span>The bird is</span><span class="lang-blank" data-state="idle">▢</span><span class="lang-noun">the tree.</span></div><div class="lang-choices" role="group" aria-label="prepositions"><button type="button" class="lang-choice" data-state="idle" aria-label="above">above</button><button type="button" class="lang-choice" data-state="idle" aria-label="in">in</button><button type="button" class="lang-choice" data-state="idle" aria-label="under">under</button></div></div></div><div class="lab-aside"><span class="lab-pill" data-state="no">0 / 1</span></div></div></div>