<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Translation — read codons into protein</p><p class="lab-prompt">Each 3-base codon codes for one amino acid. Read the chain off the genetic code.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:14px;overflow-x:auto"><div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><span style="min-width:96px;font-size:11px;font-weight:700;color:var(--stage-muted)">mRNA codons</span><div style="min-width:52px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:color-mix(in oklab, var(--stage-fg) 26%, var(--stage-bg));color:var(--stage-bg);padding:0 6px">AUG</div><div style="min-width:52px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:color-mix(in oklab, var(--stage-fg) 26%, var(--stage-bg));color:var(--stage-bg);padding:0 6px">UUU</div><div style="min-width:52px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:color-mix(in oklab, var(--stage-fg) 26%, var(--stage-bg));color:var(--stage-bg);padding:0 6px">GGA</div><div style="min-width:52px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:color-mix(in oklab, var(--stage-fg) 26%, var(--stage-bg));color:var(--stage-bg);padding:0 6px">UAC</div><div style="min-width:52px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;background:color-mix(in oklab, var(--stage-fg) 26%, var(--stage-bg));color:var(--stage-bg);padding:0 6px">UAA</div></div><div style="display:flex;gap:6px"><span style="min-width:96px"></span><div style="min-width:52px;text-alig