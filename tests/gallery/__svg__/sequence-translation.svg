ge-muted)">?</button></div></div></div></div><div class="lab-controls"><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Gly</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Leu</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Met</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Phe</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Ser</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Tyr</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:inherit;font-weight:800">Stop</span></button><span class="lab-pill" data-state="no">0/5 paired</span></div><div class="lab-foot"><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">0 of 5 paired.</div></div></div>