<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Sort the accounts into the two statements</p><p class="lab-prompt">Income &amp; Expense → Income Statement; Asset, Liability &amp; Equity → Balance Sheet.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="display:flex;gap:12px;flex-wrap:wrap"><div style="flex:1;min-width:180px;border-radius:10px;border:1px solid var(--stage-grid);background:var(--stage-bg);padding:12px"><p style="margin:0 0 6px;font-weight:700;font-size:13px">Income Statement <span style="color:var(--stage-muted);font-weight:400">· this period</span></p><p style="font-size:12px;color:var(--stage-muted)">drop Income &amp; Expense here</p></div><div style="flex:1;min-width:180px;border-radius:10px;border:1px solid var(--stage-grid);background:var(--stage-bg);padding:12px;border-color:var(--stage-grid)"><p style="margin:0 0 6px;font-weight:700;font-size:13px">Balance Sheet <span style="color:var(--stage-muted);font-weight:400">· standing</span></p><p style="font-size:12px;color:var(--stage-muted)">drop Asset, Liability &amp; Equity here</p></div></div></div></div><div class="lab-foot"><div style="margin-top:12px"><div style="display:flex;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1px solid var(--stage-grid)"><span style="font-size:13px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-good);margin-right:6px"></span>Cash</span><button type="button" class="lab-chip">Income St.</button><button type="button" class="lab-chip">Balance Sh.</button></div><div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1px solid var(--stage-grid)"><span style="font-size:13px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-good);margin-right:6px"></span>Equipment</span><button type="button" class="lab-chip">Income St.</button><button type="button" class="lab-chip">Balance Sh.</button></div><div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1px solid var(--stage-grid)"><span style="font-size:13px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-danger);margin-right:6px"></span>Bank loan</span><button type="button" class="lab-chip">Income St.</button><button type="button" class="lab-chip">Balance Sh.</button></div><div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1px solid var(--stage-grid)"><span style="font-size:13px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-accent);margin-right:6px"></span>Capital</span><button type="button" class="lab-chip">Income St.</button><button type="button" class="lab-chip">Balance Sh.</button></div><div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1px solid var(--stage-grid)"><span style="font-size:13px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-accent-2);margin-right:6px"></span>Sales</span><button type="button" class="lab-chip">Income St.</button><button type="button" class="lab-chip">Balance Sh.</button></div><div style="display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:8px;border:1px solid var(--stage-grid)"><span style="font-size:13px;font-weight:600"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--stage-warn);margin-right:6px"></span>Rent expense</span><button type="button" class="lab-chip">Income St.</button><button type="button" class="lab-chip">Balance Sh.</button></div></div></div><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">6 accounts left to sort.</div></div></div>