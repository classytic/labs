<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Reflection &amp; standing waves</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lab-playwrap"><div style="border-radius:14px;overflow:hidden;background:var(--stage-bg);border:1px solid var(--stage-grid)"><div style="width:100%"><canvas role="img" aria-label="pulse on a string" style="display:block;width:100%;height:300px;touch-action:none;cursor:default"></canvas></div></div><button type="button" class="lab-play-toggle" data-playing="false" aria-label="Play" aria-pressed="false">▶ Play</button></div></div><div class="lab-aside"><div class="lab-callout" data-tone="result"><div class="lab-field-label">fixed end</div><div style="font-size:15px;font-weight:800;color:var(--stage-warn)">reflects INVERTED</div><div style="font-size:12px;color:var(--stage-muted)">green = incident + reflected (both faint)</div></div></div></div><div class="lab-controls"><span class="lab-field"><span class="lab-field-label">mode</span><span class="lab-field-row"><span style="display:flex;gap:6px"><button type="button" class="lab-chip" data-sel="true">pulse + reflect</button><button type="button" class="lab-chip" data-sel="false">standing / resonance</button></span></span></span><span class="lab-field"><span class="lab-field-label">end</span><span class="lab-field-row"><span style="display:flex;gap:6px"><button type="button" class="lab-chip" data-sel="true">fixed</button><button type="button" class="lab-chip" data-sel="false">free</button></span></span></span></div><div class="lab-foot"></div></div>