<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Blood groups (A0 × B0)</p><p class="lab-prompt">Alleles segregate into gametes, recombine, and the ratio falls out.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><p style="font-size:12px;color:var(--stage-muted);margin:0 0 8px"><span>Trait: blood type · <span><b style="color:var(--stage-accent);font-weight:800">A</b>=A, </span><span><b style="color:var(--stage-accent-2);font-weight:800">B</b>=B, </span><span><b style="color:var(--stage-muted);font-weight:800">O</b>=O</span></span></p><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:16px;overflow-x:auto"><div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;align-items:center"><span style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap">Parent 1:<span style="display:inline-flex;gap:2px;padding:2px 4px;border-radius:8px;background:color-mix(in oklab, var(--stage-fg) 6%, transparent)"><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-accent);font-weight:800" aria-label="Parent 1 gene 1 allele 1: A, tap to change">A</button><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-muted);font-weight:800" aria-label="Parent 1 gene 1 allele 2: O, tap to change">O</button></span></span><span style="display:inline-flex;align-items:center;gap:8px;flex-wrap:wrap">Parent 2:<span style="display:inline-flex;gap:2px;padding:2px 4px;border-radius:8px;background:color-mix(in oklab, var(--stage-fg) 6%, transparent)"><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-accent-2);font-weight:800" aria-label="Parent 2 gene 1 allele 1: B, tap to change">B</button><button type="button" class="lab-chip" style="min-width:26px;font-size:16px;color:var(--stage-muted);font-weight:800" aria-label="Parent 2 gene 1 allele 2: O, tap to change">O</button></span></span><span style="font-size:12px;color:var(--stage-muted)">(tap an allele to cycle it)</span></div><div style="display:inline-grid;grid-template-columns:54px repeat(2, 54px);gap:4px"><div></div><div style="text-align:center;font-size:17px;font-weight:800;color:var(--stage-fg)">B</div><div style="text-align:center;font-size:17px;font-weight:800;color:var(--stage-fg)">O</div><div style="display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--stage-fg)">A</div><button type="button" title="AB → AB" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">AB</button><button type="button" title="AO → A" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">AO</button><div style="display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--stage-fg)">O</div><button type="button" title="BO → B" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent-2) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">BO</button><button type="button" title="OO → O" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-muted) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">OO</button></div><div class="lab-bar" style="margin-top:14px;gap:16px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div style="font-size:11px;font-weight:700;color:var(--stage-muted);margin-bottom:3px">Genotype: 1 AB : 1 AO : 1 BO : 1 OO</div><div style="display:flex;height:16px;border-radius:6px;overflow:hidden;border:1px solid var(--stage-grid)"><div style="flex:0.25;background:var(--stage-good);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-accent-2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div></div></div><div style="flex:1;min-width:200px"><div style="font-size:11px;font-weight:700;color:var(--stage-muted);margin-bottom:3px">blood type: 1 AB : 1 A : 1 B : 1 O</div><div style="display:flex;height:16px;border-radius:6px;overflow:hidden;border:1px solid var(--stage-grid)"><div style="flex:0.25;background:var(--stage-good);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-accent-2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-muted);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div></div></div><span class="lab-pill" data-state="ok">1:1:1:1 AB : A : B : O</span></div></div></div></div><div class="lab-foot"><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">blood type ratio 1 AB, 1 A, 1 B, 1 O.</div></div></div>