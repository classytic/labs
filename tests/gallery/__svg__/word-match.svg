<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Match the pairs</p><p class="lab-prompt">Tap a word, then tap its match.</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lang-lab"><div class="lang-match"><div class="lang-col" aria-label="words"><div class="lang-match-row"><button type="button" class="lang-match-cell" data-state="idle" aria-label="bird"><span class="lang-cell-text" dir="ltr">bird</span></button></div><div class="lang-match-row"><button type="button" class="lang-match-cell" data-state="idle" aria-label="tree"><span class="lang-cell-text" dir="ltr">tree</span></button></div><div class="lang-match-row"><button type="button" class="lang-match-cell" data-state="idle" aria-label="fish"><span class="lang-cell-text" dir="ltr">fish</span></button></div><div class="lang-match-row"><button type="button" class="lang-match-cell" data-state="idle" aria-label="cat"><span class="lang-cell-text" dir="ltr">cat</span></button></div></div><div class="lang-col" aria-label="matches"><button type="button" class="lang-match-cell" data-state="idle" aria-label="picture for পাখি"><span class="lang-cell-icon" aria-hidden="true">🐦</span></button><button type="button" class="lang-match-cell" data-state="idle" aria-label="picture for বিড়াল"><span class="lang-cell-icon" aria-hidden="true">🐱</span></button><button type="button" class="lang-match-cell" data-state="idle" aria-label="picture for মাছ"><span class="lang-cell-icon" aria-hidden="true">🐟</span></button><button type="button" class="lang-match-cell" data-state="idle" aria-label="picture for গাছ"><span class="lang-cell-icon" aria-hidden="true">🌳</span></button></div></div><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)"></div></div></div><div class="lab-aside"><span class="lab-pill" data-state="no">0 / 4 matched</span></div></div></div>