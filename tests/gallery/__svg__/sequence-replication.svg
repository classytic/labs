<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">DNA replication, build the new strand</p><p class="lab-prompt">Each base pairs A–T and G–C. The old strand stays; you build its complement.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:14px;overflow-x:auto"><div style="display:flex;gap:6px;align-items:center;margin-bottom:4px"><span style="min-width:96px;font-size:11px;font-weight:700;color:var(--stage-muted)">template strand (old)</span><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-danger);color:var(--stage-bg);padding:0 6px">T</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-good);color:var(--stage-bg);padding:0 6px">A</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-accent);color:var(--stage-bg);padding:0 6px">C</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-accent-2);color:var(--stage-bg);padding:0 6px">G</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-accent-2);color:var(--stage-bg);padding:0 6px">G</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-good);color:var(--stage-bg);padding:0 6px">A</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-danger);color:var(--stage-bg);padding:0 6px">T</div><div style="min-width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;background:var(--stage-accent);color:var(--stage-bg);padding:0 6px">C</div></div><div style="display:flex;gap:6px"><span style="min-width:96px"></span><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div><div style="min-width:38px;text-align:center;color:var(--stage-grid);font-size:12px;line-height:12px">┊</div></div><div style="display:flex;gap:6px;align-items:center;margin-top:4px"><span style="min-width:96px;font-size:11px;font-weight:700;color:var(--stage-muted)">new strand</span><button type="button" aria-label="empty slot under T" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under A" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under C" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under G" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under G" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under A" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under T" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button><button type="button" aria-label="empty slot under C" style="min-width:38px;height:38px;border-radius:8px;padding:0 6px;font-weight:800;font-size:16px;cursor:pointer;border:2px dashed var(--stage-grid);background:var(--stage-bg);color:var(--stage-muted)">?</button></div></div></div></div><div class="lab-controls"><button type="button" class="lab-chip" data-sel="false"><span style="color:var(--stage-good);font-weight:800">A</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:var(--stage-accent);font-weight:800">C</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:var(--stage-accent-2);font-weight:800">G</span></button><button type="button" class="lab-chip" data-sel="false"><span style="color:var(--stage-danger);font-weight:800">T</span></button><span class="lab-pill" data-state="no">0/8 paired</span></div><div class="lab-foot"><p style="font-size:12px;color:var(--stage-muted);margin:8px 0 0">Each daughter DNA keeps one <b>old</b> strand + one <b>new</b> strand, that’s <b>semiconservative</b> replication.</p><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">0 of 8 paired.</div></div></div>