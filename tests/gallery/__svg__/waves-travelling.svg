<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Waves</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lab-playwrap"><div style="border-radius:14px;overflow:hidden;background:var(--stage-bg);border:1px solid var(--stage-grid)"><div style="width:100%"><canvas role="img" aria-label="travelling wave, v=fλ=4.00" style="display:block;width:100%;height:300px;touch-action:none;cursor:default"></canvas></div></div><button type="button" class="lab-play-toggle" data-playing="false" aria-label="Play" aria-pressed="false">▶ Play</button></div></div><div class="lab-aside"><div class="lab-callout" data-tone="result"><div class="lab-field-label">wave speed <span><span class="katex"><span class="katex-mathml"><math xmlns="http://www.w3.org/1998/Math/MathML"><semantics><mrow><mi>v</mi><mo>=</mo><mi>f</mi><mi>λ</mi></mrow><annotation encoding="application/x-tex">v = f\lambda</annotation></semantics></math></span><span class="katex-html" aria-hidden="true"><span class="base"><span class="strut" style="height:0.4306em;"></span><span class="mord mathnormal" style="margin-right:0.0359em;">v</span><span class="mspace" style="margin-right:0.2778em;"></span><span class="mrel">=</span><span class="mspace" style="margin-right:0.2778em;"></span></span><span class="base"><span class="strut" style="height:0.8889em;vertical-align:-0.1944em;"></span><span class="mord mathnormal" style="margin-right:0.1076em;">f</span><span class="mord mathnormal">λ</span></span></span></span></span></div><span class="lab-callout-big">4.00</span><span style="font-size:12px;color:var(--stage-muted)">1.0 · 4.0 · T=1.00</span></div></div></div><div class="lab-controls"><span class="lab-field"><span class="lab-field-label">view</span><span class="lab-field-row"><span style="display:flex;gap:6px;flex-wrap:wrap"><button type="button" class="lab-chip" data-sel="true">travelling</button><button type="button" class="lab-chip" data-sel="false">superpose</button><button type="button" class="lab-chip" data-sel="false">standing</button></span></span></span><span class="lab-field"><span class="lab-field-label">amplitude</span><span class="lab-field-row"><input type="range" class="lab-slider" min="0.5" max="2.5" step="0.1" aria-label="amplitude" style="background:linear-gradient(to right, var(--primary, oklch(0.59 0.22 261)) 0 75%, color-mix(in oklab, currentColor 20%, transparent) 75% 100%)" value="2"/><span class="lab-field-val">2.0</span></span></span><span class="lab-field"><span class="lab-field-label">wavelength</span><span class="lab-field-row"><input type="range" class="lab-slider" min="1" max="8" step="0.1" aria-label="wavelength" style="background:linear-gradient(to right, var(--primary, oklch(0.59 0.22 261)) 0 42.857142857142854%, color-mix(in oklab, currentColor 20%, transparent) 42.857142857142854% 100%)" value="4"/><span class="lab-field-val">4.0</span></span></span><span class="lab-field"><span class="lab-field-label">frequency</span><span class="lab-field-row"><input type="range" class="lab-slider" min="0.2" max="3" step="0.1" aria-label="frequency" style="background:linear-gradient(to right, var(--primary, oklch(0.59 0.22 261)) 0 28.571428571428577%, color-mix(in oklab, currentColor 20%, transparent) 28.571428571428577% 100%)" value="1"/><span class="lab-field-val">1.0</span></span></span><button type="button" class="lab-chip" data-sel="false">🔊 sound</button></div><div class="lab-foot"><div class="lab-challenge"><span class="lab-challenge-h">Predict<span class="lab-challenge-count"> · 0/2</span></span><div class="lab-challenge-q"><span class="lab-challenge-prompt"><span class="lab-challenge-num" aria-hidden="true">1</span><span>Double the frequency f while keeping the wavelength λ fixed. The wave speed v…</span></span><div class="lab-choices" role="group" aria-label="Double the frequency f while keeping the wavelength λ fixed. The wave speed v…"><button type="button" class="lab-choice" aria-pressed="false">doubles</button><button type="button" class="lab-choice" aria-pressed="false">is unchanged</button><button type="button" class="lab-choice" aria-pressed="false">halves</button></div></div><div class="lab-challenge-q"><span class="lab-challenge-prompt"><span class="lab-challenge-num" aria-hidden="true">2</span><span>Two equal waves exactly out of phase (offset ½λ) add up to…</span></span><div class="lab-choices" role="group" aria-label="Two equal waves exactly out of phase (offset ½λ) add up to…"><button type="button" class="lab-choice" aria-pressed="false">a flat line (cancel)</button><button type="button" class="lab-choice" aria-pressed="false">double the amplitude</button><button type="button" class="lab-choice" aria-pressed="false">one unchanged wave</button></div></div></div></div></div>