<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Molarity is a crowd — particles per litre</p><p class="lab-prompt">Add solute (more dots) or add water (same dots, bigger box). M = n / V is the dot density.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="border-radius:14px;overflow:hidden;background:var(--stage-bg);border:1px solid var(--stage-grid)"><div style="position:relative"><div style="width:100%"><canvas role="img" aria-label="solution: 0.5 moles in 0.5 litres, 1.00 molar" style="display:block;width:100%;height:230px;touch-action:none;cursor:crosshair"></canvas></div><span style="position:absolute;top:8px;right:10px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;background:color-mix(in oklab, var(--stage-bg) 80%, transparent);border:1px solid var(--stage-grid);border-radius:8px;padding:2px 8px;color:var(--stage-accent)">probe: 15 dots</span></div></div><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">0.50 moles in 0.50 litres is 1.00 molar.</div></div></div><div class="lab-controls"><span class="lab-field"><span class="lab-field-label">solute (mol)</span><span class="lab-field-row"><input type="range" class="lab-slider" min="0.1" max="1" step="0.05" aria-label="moles of solute" value="0.5"/><span class="lab-field-val">0.50 mol</span></span></span><span class="lab-field"><span class="lab-field-label">water → volume (L)</span><span class="lab-field-row"><input type="range" class="lab-slider" min="0.2" max="1" step="0.05" aria-label="solution volume in litres" value="0.5"/><span class="lab-field-val">0.50 L</span></span></span><span class="lab-field"><span class="lab-field-label">M = n/V</span><span class="lab-field-row"><span></span><span class="lab-field-val"><span style="color:var(--stage-accent)">1.00 mol·L⁻¹</span></span></span></span></div><div class="lab-foot"><div class="lab-challenge"><span class="lab-challenge-h">Predict<span class="lab-challenge-count"> · 0/2</span></span><div class="lab-challenge-q"><span class="lab-challenge-prompt">Add water (more volume, same solute). The molarity M = n/V…</span><div class="lab-choices" role="group" aria-label="Add water (more volume, same solute). The molarity M = n/V…"><button type="button" class="lab-choice" aria-pressed="false">falls</button><button type="button" class="lab-choice" aria-pressed="false">rises</button><button type="button" class="lab-choice" aria-pressed="false">stays the same</button></div></div><div class="lab-challenge-q"><span class="lab-challenge-prompt">Add more solute at the same volume. The molarity…</span><div class="lab-choices" role="group" aria-label="Add more solute at the same volume. The molarity…"><button type="button" class="lab-choice" aria-pressed="false">rises</button><button type="button" class="lab-choice" aria-pressed="false">falls</button><button type="button" class="lab-choice" aria-pressed="false">stays the same</button></div></div></div></div></div>