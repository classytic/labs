<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Sex linkage, why mostly sons are affected</p><p class="lab-prompt">The gene rides on the X. A carrier mother passes it to half her sons, who, with no second X, show it.</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><p style="font-size:12px;color:var(--stage-muted);margin:0 0 8px">X-linked gene: <b style="color:var(--stage-good)">Xᴮ</b>=normal (dominant), <b style="color:var(--stage-danger)">Xᵇ</b>=colour-blind (recessive). The <b>Y</b> carries no copy.</p><div style="border-radius:14px;background:var(--stage-bg);border:1px solid var(--stage-grid);padding:16px;overflow-x:auto"><div role="table" aria-label="Punnett grid, 2 by 2. phenotype &amp; sex ratio 2 normal ♀, 1 normal ♂, 1 colour-blind ♂." style="display:inline-grid;grid-template-columns:54px repeat(2, 54px);gap:4px"><div role="row" style="display:contents"><div role="columnheader" aria-hidden="true" style="pointer-events:none"></div><div role="columnheader" style="text-align:center;font-size:17px;font-weight:800;color:var(--stage-fg)">Xᴮ</div><div role="columnheader" style="text-align:center;font-size:17px;font-weight:800;color:var(--stage-fg)">Y</div></div><div role="row" style="display:contents"><div role="rowheader" style="display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--stage-fg)">Xᴮ</div><button type="button" role="cell" aria-label="Xᴮ × Xᴮ → XᴮXᴮ, normal ♀" title="XᴮXᴮ → normal ♀" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">XᴮXᴮ</button><button type="button" role="cell" aria-label="Xᴮ × Y → XᴮY, normal ♂" title="XᴮY → normal ♂" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-accent) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">XᴮY</button></div><div role="row" style="display:contents"><div role="rowheader" style="display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--stage-fg)">Xᵇ</div><button type="button" role="cell" aria-label="Xᵇ × Xᴮ → XᴮXᵇ, normal ♀" title="XᴮXᵇ → normal ♀" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-good) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">XᴮXᵇ</button><button type="button" role="cell" aria-label="Xᵇ × Y → XᵇY, colour-blind ♂" title="XᵇY → colour-blind ♂" style="width:54px;height:54px;border-radius:6px;border:1px solid var(--stage-grid);background:color-mix(in oklab, var(--stage-warn) 13%, var(--stage-bg));cursor:pointer;font-size:17px;font-weight:700;color:var(--stage-fg);padding:0">XᵇY</button></div></div></div></div><div class="lab-aside"><div class="lab-bar" style="gap:16px;flex-wrap:wrap;flex-direction:column;align-items:stretch"><div style="flex:1;min-width:200px"><div style="font-size:11px;font-weight:700;color:var(--stage-muted);margin-bottom:3px">Genotype: 1 XᴮXᴮ : 1 XᴮY : 1 XᴮXᵇ : 1 XᵇY</div><div style="display:flex;height:16px;border-radius:6px;overflow:hidden;border:1px solid var(--stage-grid)"><div style="flex:0.25;background:var(--stage-good);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-good);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-warn);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div></div></div><div style="flex:1;min-width:200px"><div style="font-size:11px;font-weight:700;color:var(--stage-muted);margin-bottom:3px">phenotype &amp; sex: 2 normal ♀ : 1 normal ♂ : 1 colour-blind ♂</div><div style="display:flex;height:16px;border-radius:6px;overflow:hidden;border:1px solid var(--stage-grid)"><div style="flex:0.5;background:var(--stage-good);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">2</div><div style="flex:0.25;background:var(--stage-accent);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div><div style="flex:0.25;background:var(--stage-warn);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--stage-bg)">1</div></div></div><span class="lab-pill" data-state="ok">2:1:1 normal ♀ : normal ♂ : colour-blind ♂</span></div></div></div><div class="lab-controls"><div style="display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap;align-items:center"><span style="display:inline-flex;align-items:center;gap:4px">Mother ♀:<button type="button" class="lab-chip" style="min-width:34px;color:var(--stage-good);font-weight:800" aria-label="mother first X allele">Xᴮ</button><button type="button" class="lab-chip" style="min-width:34px;color:var(--stage-danger);font-weight:800" aria-label="mother second X allele">Xᵇ</button></span><span style="display:inline-flex;align-items:center;gap:4px">Father ♂:<button type="button" class="lab-chip" style="min-width:34px;color:var(--stage-good);font-weight:800" aria-label="father X allele">Xᴮ</button><span style="font-weight:800;color:var(--stage-muted)">Y</span></span><span style="font-size:12px;color:var(--stage-muted)">(tap an X allele to switch Xᴮ/Xᵇ)</span></div></div><div class="lab-foot"><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">phenotype &amp; sex ratio 2 normal ♀, 1 normal ♂, 1 colour-blind ♂.</div></div></div>