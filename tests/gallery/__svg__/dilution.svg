<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Dilution: the dots don’t leave</p><p class="lab-prompt">Take an aliquot of stock, add water to the final volume. Same dots, bigger box → lower concentration.</p></div><div class="lab-body" data-aside="false"><div class="lab-figure"><div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px"><div style="border-radius:12px;overflow:hidden;background:var(--stage-bg);border:1px solid var(--stage-grid)"><div style="position:relative"><div style="width:100%"><canvas role="img" aria-label="aliquot: 0.50 moles, 2.0 molar" style="display:block;width:100%;height:180px;touch-action:none;cursor:default"></canvas></div></div><p style="text-align:center;margin:4px 0 6px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums">aliquot · C₁=2.0 · V₁=0.25 L</p></div><span style="font-size:22px;color:var(--stage-muted)">→</span><div style="border-radius:12px;overflow:hidden;background:var(--stage-bg);border:1px solid var(--stage-grid)"><div style="position:relative"><div style="width:100%"><canvas role="img" aria-label="diluted: 0.50 moles, 0.50 molar" style="display:block;width:100%;height:180px;touch-action:none;cursor:default"></canvas></div></div><p style="text-align:center;margin:4px 0 6px;font-size:12px;font-weight:700;font-variant-numeric:tabular-nums">diluted · C₂=0.50 · V₂=1.00 L</p></div></div><div aria-live="polite" style="position:absolute;width:1px;height:1px;overflow:hidden;clip-path:inset(50%)">2.0 molar times 0.25 litres gives 0.50 moles, diluted to 1.00 litres is 0.50 molar.</div></div></div><div class="lab-controls"><span class="lab-field"><span class="lab-field-label">aliquot V₁ (L)</span><span class="lab-field-row"><input type="range" class="lab-slider" min="0.1" max="0.5" step="0.05" aria-label="aliquot volume taken from stock" style="background:linear-gradient(to right, var(--primary, oklch(0.59 0.22 261)) 0 37.49999999999999%, color-mix(in okla