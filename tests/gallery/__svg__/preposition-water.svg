<div class="not-prose lab-frame"><div class="lab-frame-head"><p class="lab-title">Where is it?</p><p class="lab-prompt">Pick the preposition: in English it comes BEFORE the noun.</p></div><div class="lab-body" data-aside="true"><div class="lab-figure"><div class="lang-lab"><div class="lang-scene"><div class="lang-prepscene" role="img" aria-label="🐟 in water"><div style="position:absolute;left:0;right:0;bottom:0;height:52%;background:linear-gradient(180deg,#6aa6e6,#3f81cf);border-top-left-radius:30px 14px;border-top-right-radius:30px 14px"></div><span class="lang-prepfig" style="left:50%;top:76%;transform:translate(-50%,-50%)" aria-hidden="true">🐟</span></div></div><div class="lang-sentence" aria-label="sentence"><span>The fish is</span><span class="lang-blank" data-state="idle">▢</span><span class="lang-noun">the water.</span></div><div class="lang-choices" role="group" aria-label="prepositions"><button type="button" class="lang-choice" data-state="idle" aria-label="in">in</button><button type="button" class="lang-choice" data-state="idle" aria-label="on">on</button><button type="button" class="lang-choice" data-state="idle" aria-label="over">over</button></div></div></div><div class="lab-aside"><span class="lab-pill" data-state="no">0 / 1</span></div></div></div>